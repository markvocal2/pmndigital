name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  detect:
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.f.outputs.backend }}
      frontend: ${{ steps.f.outputs.frontend }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: f
        with:
          filters: |
            backend:
              - 'backend/**'
              - 'compose/**'
              - '.github/workflows/**'
            frontend:
              - 'frontend/**'
              - 'compose/**'
              - '.github/workflows/**'

  backend:
    needs: detect
    if: needs.detect.outputs.backend == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Block TypeORM migrations (Prisma owns the schema)
        run: |
          if [ -d backend/src/migrations ] && [ -n "$(ls -A backend/src/migrations 2>/dev/null)" ]; then
            echo "::error::TypeORM migrations are not allowed. Schema authority = Prisma (frontend/prisma/). Move DDL changes there."
            exit 1
          fi

      - run: npm ci
        working-directory: backend
      - run: npm run lint
        working-directory: backend
      - run: npm test
        working-directory: backend
      - run: npm run build
        working-directory: backend

  frontend:
    needs: detect
    if: needs.detect.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci
        working-directory: frontend
      - run: npx prisma generate
        working-directory: frontend
      - run: npx tsc --noEmit
        working-directory: frontend
      - run: npm run lint
        working-directory: frontend
      - run: npm test
        working-directory: frontend
      - run: npm run build
        working-directory: frontend
        env:
          DATABASE_URL: postgresql://stub:stub@localhost:5432/stub
          NEXTAUTH_URL: http://localhost:3000
          NEXTAUTH_SECRET: ci-stub-secret-not-for-prod
