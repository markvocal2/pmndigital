name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-prod
  cancel-in-progress: false

permissions:
  contents: read
  packages: write

jobs:
  build-push:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        app: [backend, frontend]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ghcr.io/markvocal2/pmndigital-${{ matrix.app }}
          tags: |
            type=sha,format=long
            type=raw,value=latest,enable={{is_default_branch}}

      - uses: docker/build-push-action@v6
        with:
          context: ./${{ matrix.app }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.app }}
          cache-to: type=gha,scope=${{ matrix.app }},mode=max

  trigger-komodo:
    needs: build-push
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Komodo redeploy (GitHub-style HMAC webhook)
        env:
          KOMODO_WEBHOOK_SECRET: ${{ secrets.KOMODO_WEBHOOK_SECRET }}
          KOMODO_WEBHOOK_URL: ${{ secrets.KOMODO_WEBHOOK_URL }}
          PAYLOAD: '{"ref":"refs/heads/main","repository":{"full_name":"markvocal2/pmndigital"}}'
        run: |
          set -e
          SIG=$(printf '%s' "$PAYLOAD" | openssl dgst -sha256 -hmac "$KOMODO_WEBHOOK_SECRET" -hex | awk '{print $2}')
          curl -fsSL --retry 3 --retry-delay 5 -X POST \
            -H "Content-Type: application/json" \
            -H "X-GitHub-Event: push" \
            -H "X-Hub-Signature-256: sha256=$SIG" \
            -d "$PAYLOAD" \
            "$KOMODO_WEBHOOK_URL"

  purge-cdn:
    needs: trigger-komodo
    runs-on: ubuntu-latest
    steps:
      - name: Wait for rollout, then purge Cloudflare cache
        # Prevents stale/404 _next/static chunks (cached during container rollover)
        # from breaking hydration on the live site. Skips if CF secrets are unset.
        env:
          CF_ZONE_ID: ${{ secrets.CF_ZONE_ID }}
          CF_PURGE_TOKEN: ${{ secrets.CF_PURGE_TOKEN }}
        run: |
          if [ -z "$CF_PURGE_TOKEN" ] || [ -z "$CF_ZONE_ID" ]; then
            echo "CF purge secrets not set — skipping. Add repo secrets CF_ZONE_ID + CF_PURGE_TOKEN (scoped Cache-Purge token) to enable auto-purge."
            exit 0
          fi
          echo "Waiting ~150s for Komodo to pull images and recreate containers..."
          sleep 150
          curl -fsSL -X POST "https://api.cloudflare.com/client/v4/zones/$CF_ZONE_ID/purge_cache" \
            -H "Authorization: Bearer $CF_PURGE_TOKEN" \
            -H "Content-Type: application/json" \
            --data '{"purge_everything":true}'
          echo
          echo "Cloudflare cache purged."
